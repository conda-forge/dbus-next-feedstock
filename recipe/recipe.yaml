schema_version: 1

context:
  name: dbus-next
  version: 0.2.3

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dbus_next-${{ version }}.tar.gz
  sha256: f4eae26909332ada528c0a3549dda8d4f088f9b365153952a408e28023a626a5

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - dbus_next
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: A zero-dependency DBus library for Python with asyncio support
  license: MIT
  license_file:
    - LICENSE
  homepage: https://github.com/altdesktop/python-dbus-next

extra:
  recipe-maintainers:
    - jan-janssen
